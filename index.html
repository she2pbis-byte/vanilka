<html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Геометрический персонаж: уход без масштабирования</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --body-outer: #C7886B;
            --body-inner: #FFECD2;
            --stroke: #000000;
            --stroke-width: 2px;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .character-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.72); 
            transform-origin: center;
        }

        #sceneAnchor {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tilda-container {
            position: absolute;
            top: -10px;
            width: 120px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            transform-origin: center center;
            animation: tildaSwing 6s infinite ease-in-out;
            pointer-events: none;
        }

        /* Анимации прыжка */
        @keyframes tildaLeafJump {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            10% { transform: translateY(15px) translateX(0) rotate(0deg); } 
            25% { transform: translateY(-130px) translateX(0) rotate(0deg); } 
            35% { transform: translateY(-110px) translateX(25px) rotate(-12deg); }
            55% { transform: translateY(-80px) translateX(-35px) rotate(18deg); }
            85% { transform: translateY(-20px) translateX(10px) rotate(-5deg); }
            100% { transform: translateY(0) translateX(0) rotate(0deg); }
        }

        .animate-tilda-leaf {
            animation: tildaLeafJump 3s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        }

        @keyframes sharpJump {
            0% { transform: translateY(0) scale(1, 1); }
            10% { transform: translateY(15px) scale(1.066, 0.933); }
            25% { transform: translateY(-130px) scale(0.95, 1.066); }
            45% { transform: translateY(0) scale(1.033, 0.966); }
            55% { transform: translateY(0) scale(1, 1); }
            100% { transform: translateY(0) scale(1, 1); }
        }

        @keyframes sharpLegJump {
            0% { transform: translateY(0); }
            10% { transform: translateY(5px); }
            25% { transform: translateY(-70px); }
            45% { transform: translateY(0); }
            100% { transform: translateY(0); }
        }

        .animate-jump-sharp {
            animation: sharpJump 3s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
        }

        .animate-leg-jump-sharp {
            animation: sharpLegJump 3s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
        }

        /* АНИМАЦИЯ ПОБЕГА: Используем только translateX, не затрагивая масштаб */
        @keyframes escapeRun {
            0% { transform: translateX(0); }
            28.5% { transform: translateX(60px); } /* 1 сек */
            85.7% { transform: translateX(60px); } /* пауза 2 сек */
            100% { transform: translateX(150vw); } /* резкий уход за край */
        }

        .animate-escape {
            /* Важно сохранить transform: scale(0.72) в анимации, если она перекрывает стиль класса */
            animation: escapeRun 3.5s ease-in-out forwards !important;
        }

        .body-main {
            position: relative;
            margin-top: 25px; 
            width: 210px;
            height: 210px;
            background-color: var(--body-outer);
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .body-breath-active {
            animation: bodyBreathAnimation 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes bodyBreathAnimation {
            0%, 100% { transform: scale(1); }
            40% { transform: scale(1.06); } 
        }

        .face-area {
            width: 154px;
            height: 154px;
            background-color: var(--body-inner);
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            position: relative;
            z-index: 2;
        }

        .eyes-row {
            display: flex;
            gap: 18px;
            margin-bottom: 10px; 
        }

        .eye {
            width: 38px;
            height: 38px;
            background-color: #ffffff;
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden; 
        }

        .eye::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--body-inner);
            border-bottom: var(--stroke-width) solid var(--stroke);
            transition: top 0.1s ease-in-out;
            z-index: 10;
        }

        .eye.blinking::after {
            top: 0;
        }

        .mouth-svg {
            width: 60px;
            height: 25px;
            overflow: visible;
        }

        .mouth-path {
            fill: none;
            stroke: var(--stroke);
            stroke-width: 2.5px;
            stroke-linecap: round;
            transition: d 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes mouthStretchSharp {
            0% { transform: scaleX(1); }
            10% { transform: scaleX(1.1); }
            25% { transform: scaleX(0.9); }
            45% { transform: scaleX(1.05); }
            60% { transform: scaleX(1); }
        }

        .animate-mouth-jump-sharp {
            animation: mouthStretchSharp 3s ease-out;
        }

        .pupil {
            width: 16px;
            height: 16px;
            background-color: var(--stroke);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .arm {
            position: absolute;
            width: 26px;
            height: 100px;
            top: 75%;
            transition: transform 0.3s ease;
            transform-origin: top center; 
        }

        .arm-sleeve {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 35px;
            background-color: var(--body-outer);
            border: var(--stroke-width) solid var(--stroke);
            z-index: 5;
        }

        .arm-left { left: -18px; z-index: 20; transform: translateY(-50%) rotate(10deg); }
        .arm-right { right: -18px; z-index: 20; transform: translateY(-50%) rotate(-10deg); cursor: pointer; }

        @keyframes waveHello {
            0% { transform: translateY(-50%) rotate(10deg); }
            20% { transform: translateY(-50%) rotate(150deg); }
            40% { transform: translateY(-50%) rotate(120deg); }
            60% { transform: translateY(-50%) rotate(150deg); }
            80% { transform: translateY(-50%) rotate(120deg); }
            100% { transform: translateY(-50%) rotate(10deg); }
        }

        @keyframes rightArmGrow {
            0% { transform: translateY(-50%) rotate(-10deg) scale(1); }
            85% { transform: translateY(-50%) rotate(180deg) scale(1.5); } 
            100% { transform: translateY(-50%) rotate(-10deg) scale(1); }  
        }

        .animate-right-arm-grow { animation: rightArmGrow 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
        .animate-wave-hello { animation: waveHello 1.5s ease-in-out forwards; }

        .legs { display: flex; gap: 60px; margin-top: -33px; z-index: 5; transition: transform 0.1s ease; }
        .leg {
            width: 22px; height: 75px; background-color: var(--body-inner); 
            border: var(--stroke-width) solid var(--stroke); border-bottom: none;
            position: relative; cursor: pointer;
        }

        .leg::before {
            content: ''; position: absolute; top: 0; left: -2px; width: 22px; height: 35px;
            background-color: var(--body-outer); border: var(--stroke-width) solid var(--stroke);
        }

        .leg::after {
            content: ''; position: absolute; bottom: -38px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 48px; background-color: var(--body-inner);
            border: var(--stroke-width) solid var(--stroke); border-radius: 50%;
        }

        @keyframes tildaSwing {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-3deg); }
        }

    </style>
</head>
<body>

    <div id="sceneAnchor">
        <!-- Анимация применяется к этому контейнеру, сохраняя масштаб дочернего charWrapper -->
        <div id="escapeContainer">
            <div class="character-wrapper" id="charWrapper">
                <div class="tilda-container" id="tildaContainer">
                    <svg viewBox="0 0 120 48" style="width:100%; height:100%">
                        <path d="M8,20 C20,4 44,8 60,20 C76,32 100,28 112,16 L112,32 C100,44 76,48 60,36 C44,24 20,20 8,32 Z" 
                            fill="var(--body-outer)" stroke="var(--stroke)" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                </div>

                <div class="body-main" id="bodyMain">
                    <div id="leftArm" class="arm arm-left">
                        <div class="arm-sleeve"></div>
                        <div style="position:absolute; top:33px; left:0; width:100%; height:41px; background:var(--body-inner); border-left:2px solid black; border-right:2px solid black;"></div>
                        <div style="position:absolute; top:72px; left:0; width:100%; height:26px; display:flex; justify-content:space-between;">
                            <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                            <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                            <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                        </div>
                    </div>
                    
                    <div class="face-area" id="faceArea">
                        <div class="eyes-row">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <svg class="mouth-svg" viewBox="0 0 60 20">
                            <path id="mouthPath" class="mouth-path" d="M 5,10 C 20,10 40,10 55,10" />
                        </svg>
                    </div>

                    <div id="rightArm" class="arm arm-right">
                        <div class="arm-sleeve"></div>
                        <div style="position:absolute; top:33px; width:100%; height:75px; background:var(--body-inner); border:2px solid black; border-top:none; border-bottom-right-radius:40px;"></div>
                    </div>
                </div>

                <div class="legs" id="legsContainer">
                    <div class="leg"></div>
                    <div class="leg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const bodyMain = document.getElementById('bodyMain');
            const legsContainer = document.getElementById('legsContainer');
            const tildaContainer = document.getElementById('tildaContainer');
            const mouthPath = document.getElementById('mouthPath');
            const leftArm = document.getElementById('leftArm');
            const rightArm = document.getElementById('rightArm');
            const escapeContainer = document.getElementById('escapeContainer');
            const eyes = document.querySelectorAll('.eye');
            const pupils = document.querySelectorAll('.pupil');
            
            let isAnimating = false;
            let moveEyesTimeout = null;
            let blinkTimeout = null;
            let breathTimeout = null;
            let idleTimer = null;
            let hasEscaped = false;

            const IDLE_LIMIT = 30000; 
            const STRAIGHT_PATH = "M 5,10 C 20,10 40,10 55,10";
            const SMILE_PATH = "M 5,10 C 15,18 45,18 55,10";

            function resetIdleTimer() {
                if (hasEscaped) return;
                clearTimeout(idleTimer);
                if (!isAnimating) {
                    idleTimer = setTimeout(triggerEscape, IDLE_LIMIT);
                }
            }

            function triggerEscape() {
                if (isAnimating || hasEscaped) return;
                
                stopIdleAnimations();
                hasEscaped = true;
                // Применяем анимацию к контейнеру, чтобы не трогать масштаб персонажа
                escapeContainer.classList.add('animate-escape');
                
                // Взгляд в сторону бегства
                pupils.forEach(p => { p.style.transform = 'translate(8px, 0)'; });
            }

            function stopIdleAnimations() {
                isAnimating = true;
                clearTimeout(moveEyesTimeout);
                clearTimeout(blinkTimeout);
                clearTimeout(breathTimeout);
                
                bodyMain.classList.remove('body-breath-active');
                eyes.forEach(e => e.classList.remove('blinking'));
                
                pupils.forEach(p => {
                    p.style.transform = 'translate(0, 0)';
                });
            }

            function resumeIdleAnimations() {
                if (hasEscaped) return;
                isAnimating = false;
                scheduleNextBreath();
                moveEyesRandomly();
                blinkRandomly();
            }

            function moveEyesRandomly() {
                if (isAnimating || hasEscaped) return;
                const x = (Math.random() - 0.5) * 12;
                const y = (Math.random() - 0.5) * 8;
                pupils.forEach(p => { p.style.transform = `translate(${x}px, ${y}px)`; });
                moveEyesTimeout = setTimeout(moveEyesRandomly, Math.random() * 3000 + 2000);
            }

            function blinkRandomly() {
                if (isAnimating || hasEscaped) return;
                const blinkDuration = 150;
                eyes.forEach(e => e.classList.add('blinking'));
                setTimeout(() => {
                    eyes.forEach(e => e.classList.remove('blinking'));
                    if (isAnimating || hasEscaped) return;
                    const doubleBlink = Math.random() < 0.2;
                    const nextInterval = doubleBlink ? 200 : (Math.random() * 4000 + 3000);
                    blinkTimeout = setTimeout(blinkRandomly, nextInterval);
                }, blinkDuration);
            }

            function triggerBreath() {
                if (isAnimating || hasEscaped) return;
                bodyMain.classList.add('body-breath-active');
                setTimeout(() => {
                    bodyMain.classList.remove('body-breath-active');
                    scheduleNextBreath();
                }, 3000);
            }

            function scheduleNextBreath() { 
                if (isAnimating || hasEscaped) return;
                breathTimeout = setTimeout(triggerBreath, Math.random() * 5000 + 3000); 
            }

            window.addEventListener('mousedown', resetIdleTimer);
            window.addEventListener('touchstart', resetIdleTimer);

            moveEyesRandomly();
            blinkRandomly();
            scheduleNextBreath();
            resetIdleTimer();

            // Обработчики кликов
            bodyMain.addEventListener('click', (e) => {
                if (e.target.closest('.arm') || e.target.closest('.legs') || isAnimating || hasEscaped) return;
                stopIdleAnimations();
                leftArm.classList.add('animate-wave-hello');
                setTimeout(() => { mouthPath.setAttribute('d', SMILE_PATH); }, 100);
                pupils.forEach(p => { p.style.transform = 'translate(0, 0) scale(1.3)'; });

                setTimeout(() => {
                    leftArm.classList.remove('animate-wave-hello');
                    mouthPath.setAttribute('d', STRAIGHT_PATH);
                    pupils.forEach(p => { p.style.transform = 'translate(0, 0) scale(1)'; });
                    resumeIdleAnimations();
                    resetIdleTimer();
                }, 1500);
            });

            rightArm.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (isAnimating || hasEscaped) return;
                stopIdleAnimations();
                rightArm.classList.add('animate-right-arm-grow');
                setTimeout(() => {
                    rightArm.classList.remove('animate-right-arm-grow');
                    resumeIdleAnimations();
                    resetIdleTimer();
                }, 800); 
            });

            legsContainer.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (isAnimating || hasEscaped) return;
                stopIdleAnimations();
                bodyMain.classList.add('animate-jump-sharp');
                legsContainer.classList.add('animate-leg-jump-sharp');
                tildaContainer.classList.add('animate-tilda-leaf');
                mouthPath.closest('.mouth-svg').classList.add('animate-mouth-jump-sharp');
                pupils.forEach(p => { p.style.transform = 'translate(0, -5px)'; });
                setTimeout(() => {
                    bodyMain.classList.remove('animate-jump-sharp');
                    legsContainer.classList.remove('animate-leg-jump-sharp');
                    tildaContainer.classList.remove('animate-tilda-leaf');
                    mouthPath.closest('.mouth-svg').classList.remove('animate-mouth-jump-sharp');
                    resumeIdleAnimations();
                    resetIdleTimer();
                }, 3000);
            });
        };
    </script>
</body>
</html>
