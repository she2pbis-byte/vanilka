<html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Геометрический персонаж: плавная улыбка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --body-outer: #C7886B;
            --body-inner: #FFECD2;
            --stroke: #000000;
            --stroke-width: 2px;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .character-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.72); 
            transform-origin: center;
        }

        .tilda-container {
            position: absolute;
            top: -10px;
            width: 120px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            transform-origin: center center;
            animation: tildaSwing 6s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes tildaJumpFixedStart {
            0% { transform: translateY(0) rotate(0deg) translateX(0); }
            5% { transform: translateY(5px) rotate(0deg) translateX(0); }
            15% { transform: translateY(-110px) rotate(0deg) translateX(0); } 
            25% { transform: translateY(-100px) translateX(45px) rotate(-15deg); }
            29% { transform: translateY(-95px) translateX(45px) rotate(-15deg); }
            38% { transform: translateY(-80px) translateX(-40px) rotate(15deg); }
            42% { transform: translateY(-75px) translateX(-40px) rotate(15deg); }
            52% { transform: translateY(-60px) translateX(30px) rotate(-12deg); }
            56% { transform: translateY(-56px) translateX(30px) rotate(-12deg); }
            68% { transform: translateY(-40px) translateX(-20px) rotate(10deg); }
            72% { transform: translateY(-37px) translateX(-20px) rotate(10deg); }
            82% { transform: translateY(-20px) translateX(10px) rotate(-6deg); }
            86% { transform: translateY(-17px) translateX(10px) rotate(-6deg); }
            94% { transform: translateY(-5px) translateX(-3px) rotate(3deg); }
            97% { transform: translateY(-2px) translateX(-3px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0deg) translateX(0); }
        }

        .animate-tilda-jump {
            animation: tildaJumpFixedStart 2.4s linear forwards !important;
        }

        @keyframes lookAtTildaJump {
            0% { transform: translate(0, 0); }
            5% { transform: translate(0, 2px); }
            15% { transform: translate(0, -12px); }
            25% { transform: translate(6px, -10px); }
            42% { transform: translate(-6px, -8px); }
            56% { transform: translate(4px, -6px); }
            72% { transform: translate(-3px, -4px); }
            86% { transform: translate(2px, -2px); }
            100% { transform: translate(0, 0); }
        }

        .animate-look-tilda-jump {
            animation: lookAtTildaJump 2.4s linear forwards !important;
        }

        .body-main {
            position: relative;
            margin-top: 25px; 
            width: 210px;
            height: 210px;
            background-color: var(--body-outer);
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .body-breath-active {
            animation: bodyBreathAnimation 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes bodyBreathAnimation {
            0%, 100% { transform: scale(1); }
            40% { transform: scale(1.06); } 
            55% { transform: scale(1.055); } 
        }

        @keyframes jump {
            0% { transform: translateY(0) scale(1, 1); }
            15% { transform: translateY(5px) scale(1.1, 0.9); }
            45% { transform: translateY(-110px) scale(0.9, 1.1); }
            75% { transform: translateY(0) scale(1.05, 0.95); }
            100% { transform: translateY(0) scale(1, 1); }
        }

        @keyframes legJump {
            0% { transform: translateY(0) scale(1, 1); }
            15% { transform: translateY(0) scale(1.1, 0.9); }
            45% { transform: translateY(-55px) scale(0.95, 1.05); }
            75% { transform: translateY(0) scale(1.05, 0.95); }
            100% { transform: translateY(0) scale(1, 1); }
        }

        .animate-jump {
            animation: jump 0.8s cubic-bezier(0.42, 0, 0.58, 1) !important;
        }

        .animate-leg-jump {
            animation: legJump 0.8s cubic-bezier(0.42, 0, 0.58, 1) !important;
        }

        .face-area {
            width: 154px;
            height: 154px;
            background-color: var(--body-inner);
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        .eyes-row {
            display: flex;
            gap: 18px;
            margin-bottom: 10px; 
        }

        .eye {
            width: 38px;
            height: 38px;
            background-color: #ffffff;
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden; 
        }

        .mouth-svg {
            width: 56px;
            height: 20px;
            overflow: visible;
        }

        /* Улучшенная плавная улыбка через CSS transition */
        .mouth-path {
            fill: none;
            stroke: var(--stroke);
            stroke-width: 2px;
            stroke-linecap: round;
            transition: d 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes mouthStretch {
            0%, 100% { transform: scaleX(1); }
            45% { transform: scaleX(1.2); }
        }

        .animate-mouth-jump {
            animation: mouthStretch 0.8s ease-in-out;
        }

        .pupil {
            width: 16px;
            height: 16px;
            background-color: var(--stroke);
            border-radius: 50%;
            animation: lookAround 8s infinite ease-in-out;
        }

        .arm {
            position: absolute;
            width: 26px;
            height: 100px;
            top: 75%;
            transition: transform 0.3s ease;
            pointer-events: auto;
            transform-origin: top center; 
        }

        .arm-sleeve {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 35px;
            background-color: var(--body-outer);
            border: var(--stroke-width) solid var(--stroke);
            z-index: 5;
        }

        .arm-left { left: -18px; z-index: 20; transform: translateY(-50%) rotate(10deg); }
        .arm-right { right: -18px; z-index: 20; transform: translateY(-50%) rotate(-10deg); cursor: pointer; }

        @keyframes waveHello {
            0% { transform: translateY(-50%) rotate(10deg); }
            20% { transform: translateY(-50%) rotate(150deg); }
            40% { transform: translateY(-50%) rotate(130deg); }
            60% { transform: translateY(-50%) rotate(150deg); }
            80% { transform: translateY(-50%) rotate(130deg); }
            100% { transform: translateY(-50%) rotate(10deg); }
        }

        @keyframes rightArmGrow {
            0% { transform: translateY(-50%) rotate(-10deg) scale(1); z-index: 20; }
            1% { z-index: 100; } 
            60% { transform: translateY(-50%) rotate(180deg) scale(1.5); } 
            100% { transform: translateY(-50%) rotate(-10deg) scale(1); z-index: 20; }  
        }

        .animate-right-arm-grow { animation: rightArmGrow 1.1s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }

        .legs { display: flex; gap: 60px; margin-top: -33px; z-index: 5; }
        .leg {
            width: 22px; height: 75px; background-color: var(--body-inner); 
            border: var(--stroke-width) solid var(--stroke); border-bottom: none;
            position: relative; cursor: pointer;
        }

        .leg::before {
            content: ''; position: absolute; top: 0; left: -2px; width: 22px; height: 35px;
            background-color: var(--body-outer); border: var(--stroke-width) solid var(--stroke);
        }

        .leg::after {
            content: ''; position: absolute; bottom: -38px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 48px; background-color: var(--body-inner);
            border: var(--stroke-width) solid var(--stroke); border-radius: 50%;
        }

        @keyframes lookAround {
            0%, 10%, 90%, 100% { transform: translate(0, 0); }
            20%, 35% { transform: translate(-6px, 0); }
            65%, 80% { transform: translate(6px, 0); }
        }
        
        @keyframes tildaSwing {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-3deg); }
        }

        .animate-look-hello { animation: lookStraightAndBig 1.5s ease-in-out forwards !important; }
        .animate-wave-hello { animation: waveHello 1.5s ease-in-out forwards !important; }
        @keyframes lookStraightAndBig { 0%, 100% { transform: scale(1); } 20%, 80% { transform: scale(1.3); } }

    </style>
</head>
<body>

    <div class="character-wrapper">
        <div class="tilda-container" id="tildaContainer">
            <svg class="tilda-svg" viewBox="0 0 120 48">
                <path d="M8,20 C20,4 44,8 60,20 C76,32 100,28 112,16 L112,32 C100,44 76,48 60,36 C44,24 20,20 8,32 Z" 
                    fill="var(--body-outer)" stroke="var(--stroke)" stroke-width="2" stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="body-main" id="bodyMain">
            <div id="leftArm" class="arm arm-left">
                <div class="arm-sleeve"></div>
                <div style="position:absolute; top:33px; left:0; width:100%; height:41px; background:var(--body-inner); border-left:2px solid black; border-right:2px solid black;"></div>
                <div style="position:absolute; top:72px; left:0; width:100%; height:26px; display:flex; justify-content:space-between;">
                    <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                    <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                    <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                </div>
            </div>
            
            <div class="face-area" id="faceArea">
                <div class="eyes-row">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <svg class="mouth-svg" viewBox="0 0 56 20">
                    <path id="mouthPath" class="mouth-path" d="M 0,10 L 56,10"></path>
                </svg>
            </div>

            <div id="rightArm" class="arm arm-right">
                <div class="arm-sleeve"></div>
                <div style="position:absolute; top:33px; width:100%; height:75px; background:var(--body-inner); border:2px solid black; border-top:none; border-bottom-right-radius:40px;"></div>
            </div>
        </div>

        <div class="legs" id="legsContainer">
            <div class="leg"></div>
            <div class="leg"></div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const bodyMain = document.getElementById('bodyMain');
            const legsContainer = document.getElementById('legsContainer');
            const tildaContainer = document.getElementById('tildaContainer');
            const mouthPath = document.getElementById('mouthPath');
            const mouthSvg = mouthPath.closest('.mouth-svg');
            const leftArm = document.getElementById('leftArm');
            const rightArm = document.getElementById('rightArm');
            const pupils = document.querySelectorAll('.pupil');
            
            let isAnimating = false;

            // Константы путей
            const MOUTH_NEUTRAL = "M 0,10 L 56,10";
            const MOUTH_SMILE = "M 0,5 Q 28,25 56,5";

            function triggerBreath() {
                if (isAnimating) { 
                    scheduleNextBreath(); 
                    return; 
                }
                bodyMain.classList.add('body-breath-active');
                setTimeout(() => {
                    bodyMain.classList.remove('body-breath-active');
                    scheduleNextBreath();
                }, 3000);
            }

            function scheduleNextBreath() { 
                setTimeout(triggerBreath, Math.random() * 5000 + 3000); 
            }
            
            scheduleNextBreath();

            function interruptBreath() {
                bodyMain.classList.remove('body-breath-active');
            }

            // ПРИВЕТСТВИЕ И ПЛАВНАЯ УЛЫБКА
            bodyMain.addEventListener('click', (e) => {
                if (e.target.closest('.arm') || isAnimating) return;
                isAnimating = true;
                interruptBreath();
                
                leftArm.classList.add('animate-wave-hello');
                
                // Плавно меняем путь SVG для улыбки
                mouthPath.setAttribute('d', MOUTH_SMILE);
                
                pupils.forEach(p => {
                    p.style.animation = 'none';
                    void p.offsetHeight;
                    p.classList.add('animate-look-hello');
                });
                
                setTimeout(() => {
                    leftArm.classList.remove('animate-wave-hello');
                    
                    // Плавно возвращаем в нейтральное состояние
                    mouthPath.setAttribute('d', MOUTH_NEUTRAL);
                    
                    pupils.forEach(p => {
                        p.classList.remove('animate-look-hello');
                        p.style.animation = 'lookAround 8s infinite ease-in-out';
                    });
                    isAnimating = false;
                }, 1500);
            });

            // РОСТ РУКИ
            rightArm.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (isAnimating) return;
                isAnimating = true;
                interruptBreath();
                rightArm.classList.add('animate-right-arm-grow');
                setTimeout(() => {
                    rightArm.classList.remove('animate-right-arm-grow');
                    isAnimating = false;
                }, 1100); 
            });

            // ПРЫЖОК
            legsContainer.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (isAnimating) return;
                isAnimating = true;
                interruptBreath();

                bodyMain.classList.add('animate-jump');
                legsContainer.classList.add('animate-leg-jump');
                
                tildaContainer.classList.add('animate-tilda-jump');
                mouthSvg.classList.add('animate-mouth-jump');
                
                pupils.forEach(p => {
                    p.style.animation = 'none';
                    void p.offsetHeight;
                    p.classList.add('animate-look-tilda-jump');
                });

                setTimeout(() => {
                    bodyMain.classList.remove('animate-jump');
                    legsContainer.classList.remove('animate-leg-jump');
                }, 800);

                setTimeout(() => {
                    tildaContainer.classList.remove('animate-tilda-jump');
                    mouthSvg.classList.remove('animate-mouth-jump');
                    pupils.forEach(p => {
                        p.classList.remove('animate-look-tilda-jump');
                        p.style.animation = 'lookAround 8s infinite ease-in-out';
                    });
                    isAnimating = false;
                }, 2400);
            });
        };
    </script>
</body>
</html>
