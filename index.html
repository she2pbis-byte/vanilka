<html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Геометрический персонаж: Таймер ухода</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --body-outer: #C7886B;
            --body-inner: #FFECD2;
            --stroke: #000000;
            --stroke-width: 2px;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .character-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.72); 
            transform-origin: center;
            transition: transform 1s linear;
        }

        /* --- Выключатель --- */
        #lightSwitch {
            position: absolute;
            right: 40px;
            top: calc(50% - 80px); 
            width: 60px;
            height: 100px;
            background: #ddd;
            border: 3px solid #000;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }

        .switch-label {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 12px;
            color: #333;
        }

        .switch-toggle {
            width: 30px;
            height: 40px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 4px;
            position: relative;
        }

        .switch-toggle::after {
            content: '';
            position: absolute;
            top: 4px; 
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            background: #000;
            transition: top 0.1s steps(1);
        }

        .switch-off .switch-toggle::after {
            top: auto;
            bottom: 4px;
        }

        /* --- Фантомная горизонтальная рука --- */
        #ghostHand {
            position: absolute;
            right: -150px; 
            top: calc(50% - 40px);
            width: 100px;
            height: 26px;
            z-index: 110;
            pointer-events: none;
            display: flex;
            flex-direction: row-reverse;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ghost-arm-sleeve {
            width: 35px;
            height: 100%;
            background-color: var(--body-outer);
            border: var(--stroke-width) solid var(--stroke);
        }

        .ghost-arm-skin {
            width: 41px;
            height: 100%;
            background: var(--body-inner);
            border-top: 2px solid black;
            border-bottom: 2px solid black;
        }

        .ghost-fingers {
            width: 26px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ghost-finger {
            width: 100%;
            height: 6px;
            background: var(--body-inner);
            border: 2px solid black;
            border-right: none;
            border-radius: 4px 0 0 4px;
        }

        /* --- Анимации --- */
        @keyframes walkLegStep {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .animate-walk-left-slow { animation: walkLegStep 0.8s infinite ease-in-out; }
        .animate-walk-right-slow { animation: walkLegStep 0.8s infinite ease-in-out; animation-delay: 0.4s; }
        .animate-walk-left-fast { animation: walkLegStep 0.2s infinite ease-in-out; }
        .animate-walk-right-fast { animation: walkLegStep 0.2s infinite ease-in-out; animation-delay: 0.1s; }

        @keyframes tildaJumpWithWobble {
            0% { transform: translateY(0) rotate(0deg); }
            15% { transform: translateY(-120px) rotate(0deg); } 
            35% { transform: translateY(-60px) rotate(-10deg); } 
            55% { transform: translateY(-30px) rotate(8deg); }  
            75% { transform: translateY(-10px) rotate(-5deg); } 
            90% { transform: translateY(-2px) rotate(2deg); }   
            100% { transform: translateY(0) rotate(0deg); }     
        }
        .animate-tilda-jump { animation: tildaJumpWithWobble 1.8s ease-out forwards !important; }

        .body-main {
            position: relative;
            margin-top: 25px; 
            width: 210px;
            height: 210px;
            background-color: var(--body-outer);
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .body-breath-active { animation: bodyBreathAnimation 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards; }

        @keyframes bodyBreathAnimation {
            0%, 100% { transform: scale(1); }
            40% { transform: scale(1.06); } 
        }

        @keyframes bodyJump {
            0% { transform: translateY(0); }
            25% { transform: translateY(-120px); }
            55%, 100% { transform: translateY(0); }
        }
        .animate-jump { animation: bodyJump 0.9s ease-out forwards !important; }

        .face-area {
            width: 154px; height: 154px;
            background-color: var(--body-inner);
            border: var(--stroke-width) solid var(--stroke);
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; padding-top: 30px;
            position: relative; overflow: hidden; z-index: 2;
        }

        .eyes-row { display: flex; gap: 18px; margin-bottom: 10px; }
        .eye {
            width: 38px; height: 38px; background-color: #ffffff;
            border: var(--stroke-width) solid var(--stroke); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
        }

        .eye::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 0%;
            background-color: var(--body-inner); border-bottom: 2px solid var(--stroke);
            z-index: 10; transition: height 0.05s ease-in-out;
        }
        .eye.blink::after { height: 100%; }

        .mouth-svg { width: 56px; height: 20px; overflow: visible; }
        .mouth-path {
            fill: none; stroke: var(--stroke); stroke-width: 2px; stroke-linecap: round;
            transition: d 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pupil {
            width: 16px; height: 16px; background-color: var(--stroke); border-radius: 50%;
            animation: lookAround 8s infinite ease-in-out;
        }

        .arm {
            position: absolute; width: 26px; height: 100px; top: 75%;
            transition: transform 0.3s ease; pointer-events: auto;
            transform-origin: top center; 
        }
        .arm-sleeve {
            position: absolute; top: 0; left: 0; width: 100%; height: 35px;
            background-color: var(--body-outer); border: var(--stroke-width) solid var(--stroke);
            z-index: 5;
        }
        .arm-left { left: -18px; z-index: 20; transform: translateY(-50%) rotate(10deg); }
        .arm-right { right: -18px; z-index: 20; transform: translateY(-50%) rotate(-10deg); }

        @keyframes armsSpread {
            0% { transform: translateY(-50%) rotate(var(--rot-init)); }
            25% { transform: translateY(-50%) rotate(var(--rot-spread)); }
            55%, 100% { transform: translateY(-50%) rotate(var(--rot-init)); }
        }
        .arm-left.animate-jump-arms { --rot-init: 10deg; --rot-spread: 45deg; animation: armsSpread 0.9s ease-out forwards; }
        .arm-right.animate-jump-arms { --rot-init: -10deg; --rot-spread: -45deg; animation: armsSpread 0.9s ease-out forwards; }

        @keyframes waveHelloWithWobble {
            0% { transform: translateY(-50%) rotate(10deg); }
            20% { transform: translateY(-50%) rotate(140deg); }
            30% { transform: translateY(-50%) rotate(160deg); }
            40% { transform: translateY(-50%) rotate(140deg); }
            50% { transform: translateY(-50%) rotate(160deg); }
            60% { transform: translateY(-50%) rotate(140deg); }
            70% { transform: translateY(-50%) rotate(160deg); }
            100% { transform: translateY(-50%) rotate(10deg); }
        }
        .animate-wave-hello { animation: waveHelloWithWobble 1.5s ease-in-out forwards !important; }

        @keyframes rightArmGrow {
            0% { transform: translateY(-50%) rotate(-10deg) scale(1); }
            80% { transform: translateY(-50%) rotate(180deg) scale(1.5); } 
            100% { transform: translateY(-50%) rotate(-10deg) scale(1); }  
        }
        .animate-right-arm-grow { animation: rightArmGrow 0.9s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }

        .legs { display: flex; gap: 60px; margin-top: -33px; z-index: 5; }
        .leg {
            width: 22px; height: 75px; background-color: var(--body-inner); 
            border: var(--stroke-width) solid var(--stroke); border-bottom: none;
            position: relative; cursor: pointer; transform-origin: top center;
        }
        .leg::before {
            content: ''; position: absolute; top: 0; left: -2px; width: 22px; height: 35px;
            background-color: var(--body-outer); border: var(--stroke-width) solid var(--stroke);
        }
        .leg::after {
            content: ''; position: absolute; bottom: -44px; left: 50%; transform: translateX(-50%);
            width: 38px; height: 52px; background-color: var(--body-inner);
            border: var(--stroke-width) solid var(--stroke); 
            border-radius: 50% 50% 40% 40% / 40% 40% 60% 60%;
        }

        /* --- Взгляд вверх при прыжке --- */
        @keyframes lookUpJump {
            0% { transform: translateY(0); }
            15% { transform: translateY(-12px); }
            35% { transform: translateY(-8px); } 
            55% { transform: translateY(-14px); } 
            75% { transform: translateY(-10px); } 
            100% { transform: translateY(0); }
        }
        .animate-look-jump { animation: lookUpJump 1.8s ease-out forwards !important; }

        @keyframes lookAround {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-6px, 0); }
            60% { transform: translate(6px, 0); }
        }
        .animate-look-hello { animation: lookStraightAndBig 1.5s ease-in-out forwards !important; }
        @keyframes lookStraightAndBig { 0%, 100% { transform: scale(1); } 20%, 80% { transform: scale(1.3); } }

    </style>
</head>
<body>

    <div id="lightSwitch">
        <span class="switch-label">ВКЛ</span>
        <div class="switch-toggle"></div>
        <span class="switch-label">ВЫКЛ</span>
    </div>

    <div id="ghostHand">
        <div class="ghost-arm-sleeve"></div>
        <div class="ghost-arm-skin"></div>
        <div class="ghost-fingers">
            <div class="ghost-finger"></div>
            <div class="ghost-finger"></div>
            <div class="ghost-finger"></div>
        </div>
    </div>

    <div class="character-wrapper" id="charWrapper">
        <div class="tilda-container" id="tildaContainer" style="animation: tildaSwing 6s infinite ease-in-out;">
            <svg class="tilda-svg" viewBox="0 0 120 48">
                <path d="M8,20 C20,4 44,8 60,20 C76,32 100,28 112,16 L112,32 C100,44 76,48 60,36 C44,24 20,20 8,32 Z" 
                    fill="var(--body-outer)" stroke="var(--stroke)" stroke-width="2" stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="body-main" id="bodyMain">
            <div id="leftArm" class="arm arm-left">
                <div class="arm-sleeve"></div>
                <div style="position:absolute; top:33px; left:0; width:100%; height:41px; background:var(--body-inner); border-left:2px solid black; border-right:2px solid black;"></div>
                <div style="position:absolute; top:72px; left:0; width:100%; height:26px; display:flex; justify-content:space-between;">
                    <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                    <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                    <div style="width:6px; height:100%; background:var(--body-inner); border:2px solid black; border-top:none; border-radius:0 0 4px 4px;"></div>
                </div>
            </div>
            
            <div class="face-area">
                <div class="eyes-row">
                    <div class="eye" id="eyeLeft"><div class="pupil"></div></div>
                    <div class="eye" id="eyeRight"><div class="pupil"></div></div>
                </div>
                <svg class="mouth-svg" viewBox="0 0 56 20">
                    <path id="mouthPath" class="mouth-path" d="M 0,10 L 56,10"></path>
                </svg>
            </div>

            <div id="rightArm" class="arm arm-right">
                <div class="arm-sleeve"></div>
                <div style="position:absolute; top:33px; width:100%; height:75px; background:var(--body-inner); border:2px solid black; border-top:none; border-bottom-right-radius:40px;"></div>
            </div>
        </div>

        <div class="legs" id="legsContainer">
            <div class="leg" id="legLeft"></div>
            <div class="leg" id="legRight"></div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const bodyMain = document.getElementById('bodyMain');
            const legsContainer = document.getElementById('legsContainer');
            const legLeft = document.getElementById('legLeft');
            const legRight = document.getElementById('legRight');
            const charWrapper = document.getElementById('charWrapper');
            const tildaContainer = document.getElementById('tildaContainer');
            const mouthPath = document.getElementById('mouthPath');
            const leftArm = document.getElementById('leftArm');
            const rightArm = document.getElementById('rightArm');
            const pupils = document.querySelectorAll('.pupil');
            const eyes = document.querySelectorAll('.eye');
            const lightSwitch = document.getElementById('lightSwitch');
            const ghostHand = document.getElementById('ghostHand');
            
            let isAnimating = false;
            let isGone = false; 
            let idleTimer = null;
            let animationTimeoutId = null; 
            let currentExitStage = 0; 
            
            const IDLE_TIME = 30000; 
            const MOUTH_NEUTRAL = "M 0,10 L 56,10";
            const MOUTH_SMILE = "M 0,5 Q 28,25 56,5";
            const MOUTH_SAD = "M 0,15 Q 28,0 56,15"; 

            function blink() {
                if (isGone || isAnimating) { setTimeout(blink, 1000); return; }
                eyes.forEach(eye => eye.classList.add('blink'));
                setTimeout(() => eyes.forEach(eye => eye.classList.remove('blink')), 70); 
                setTimeout(blink, Math.random() * 8000 + 4000);
            }
            setTimeout(blink, 2000);

            // Функция сброса таймера бездействия
            function resetIdleTimer() {
                if (idleTimer) clearTimeout(idleTimer);
                
                // Если персонаж уже исчез, таймер не запускаем (ждем клика по выключателю)
                if (isGone) return;

                // Если персонаж начал уход (завис у края), возвращаем его при любой активности
                if (currentExitStage === 2) {
                    stopAllTimeouts();
                    isAnimating = true;
                    legLeft.classList.add('animate-walk-left-fast');
                    legRight.classList.add('animate-walk-right-fast');
                    charWrapper.style.transition = "transform 0.5s linear"; 
                    charWrapper.style.transform = "scale(0.72) translateX(0)";
                    setTimeout(() => {
                        legLeft.classList.remove('animate-walk-left-fast');
                        legRight.classList.remove('animate-walk-right-fast');
                        isAnimating = false;
                        currentExitStage = 0;
                        resetIdleTimer();
                    }, 500);
                    return;
                }
                
                // Запуск таймера на 30 секунд
                idleTimer = setTimeout(startExitAnimation, IDLE_TIME);
            }

            function stopAllTimeouts() {
                if (animationTimeoutId) clearTimeout(animationTimeoutId);
            }

            function resetCharacter() {
                stopAllTimeouts();
                isGone = false;
                isAnimating = false;
                currentExitStage = 0;
                
                lightSwitch.style.display = 'none';
                lightSwitch.classList.remove('switch-off');
                ghostHand.style.right = '-150px';

                charWrapper.style.transition = "none";
                charWrapper.style.transform = "scale(0.72) translateX(0)";
                
                legLeft.classList.remove('animate-walk-left-fast', 'animate-walk-left-slow');
                legRight.classList.remove('animate-walk-right-fast', 'animate-walk-right-slow');
                
                pupils.forEach(p => {
                    p.classList.remove('animate-look-hello', 'animate-look-jump');
                    p.style.animation = 'lookAround 8s infinite ease-in-out';
                });
                resetIdleTimer();
            }

            function startExitAnimation() {
                if (isAnimating || isGone) return;
                isAnimating = true;
                interruptBreath();
                currentExitStage = 1;
                
                legLeft.classList.add('animate-walk-left-slow');
                legRight.classList.add('animate-walk-right-slow');
                charWrapper.style.transition = "transform 0.5s linear"; 
                charWrapper.style.transform = "scale(0.72) translateX(80px)";
                
                animationTimeoutId = setTimeout(() => {
                    currentExitStage = 2;
                    legLeft.classList.remove('animate-walk-left-slow');
                    legRight.classList.remove('animate-walk-right-slow');
                    pupils.forEach(p => {
                        p.style.animation = 'none';
                        p.classList.add('animate-look-hello');
                    });
                    
                    animationTimeoutId = setTimeout(() => {
                        currentExitStage = 3;
                        legLeft.classList.add('animate-walk-left-slow');
                        legRight.classList.add('animate-walk-right-slow');
                        charWrapper.style.transition = "transform 0.33s linear"; 
                        charWrapper.style.transform = "scale(0.72) translateX(150vw)";
                        
                        animationTimeoutId = setTimeout(() => {
                            isGone = true; 
                            isAnimating = false;
                            currentExitStage = 4;
                            legLeft.classList.remove('animate-walk-left-slow');
                            legRight.classList.remove('animate-walk-right-slow');
                            
                            lightSwitch.style.display = 'flex';

                            setTimeout(() => {
                                ghostHand.style.right = '40px'; 
                                setTimeout(() => {
                                    lightSwitch.classList.add('switch-off'); 
                                    setTimeout(() => ghostHand.style.right = '-150px', 400);
                                }, 400);
                            }, 500);
                        }, 333);
                    }, 2000);
                }, 500);
            }

            // Слушатели активности для сброса таймера
            window.addEventListener('mousedown', resetIdleTimer);
            window.addEventListener('touchstart', resetIdleTimer);
            window.addEventListener('keydown', resetIdleTimer);
            window.addEventListener('mousemove', resetIdleTimer);

            lightSwitch.addEventListener('click', resetCharacter);

            function triggerBreath() {
                if (isAnimating || isGone) { scheduleNextBreath(); return; }
                bodyMain.classList.add('body-breath-active');
                setTimeout(() => {
                    bodyMain.classList.remove('body-breath-active');
                    scheduleNextBreath();
                }, 3000);
            }
            function scheduleNextBreath() { setTimeout(triggerBreath, Math.random() * 5000 + 3000); }
            scheduleNextBreath();
            function interruptBreath() { bodyMain.classList.remove('body-breath-active'); }

            bodyMain.addEventListener('click', (e) => {
                if (e.target.closest('.arm') || isAnimating || isGone) return;
                isAnimating = true;
                interruptBreath();
                resetIdleTimer();
                leftArm.classList.add('animate-wave-hello');
                mouthPath.setAttribute('d', MOUTH_SMILE);
                pupils.forEach(p => {
                    p.style.animation = 'none';
                    void p.offsetHeight;
                    p.classList.add('animate-look-hello');
                });
                
                setTimeout(() => {
                    leftArm.classList.remove('animate-wave-hello');
                    mouthPath.setAttribute('d', MOUTH_NEUTRAL);
                    pupils.forEach(p => {
                        p.classList.remove('animate-look-hello');
                        p.style.animation = 'lookAround 8s infinite ease-in-out';
                    });
                    isAnimating = false;
                }, 1500);
            });

            rightArm.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (isAnimating || isGone) return;
                isAnimating = true;
                interruptBreath();
                resetIdleTimer();
                
                rightArm.classList.add('animate-right-arm-grow');
                pupils.forEach(p => {
                    p.style.animation = 'none';
                    void p.offsetHeight;
                    p.classList.add('animate-look-hello');
                });
                
                setTimeout(() => {
                    rightArm.classList.remove('animate-right-arm-grow');
                    pupils.forEach(p => {
                        p.classList.remove('animate-look-hello');
                        p.style.animation = 'lookAround 8s infinite ease-in-out';
                    });
                    isAnimating = false;
                }, 900);
            });

            legsContainer.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (isAnimating || isGone) return;
                isAnimating = true;
                interruptBreath();
                resetIdleTimer();

                bodyMain.classList.add('animate-jump');
                legLeft.classList.add('animate-leg-jump');
                legRight.classList.add('animate-leg-jump');
                tildaContainer.classList.add('animate-tilda-jump');
                leftArm.classList.add('animate-jump-arms');
                rightArm.classList.add('animate-jump-arms');
                
                mouthPath.setAttribute('d', MOUTH_SAD);

                pupils.forEach(p => {
                    p.style.animation = 'none';
                    void p.offsetHeight;
                    p.classList.add('animate-look-jump');
                });

                setTimeout(() => {
                    bodyMain.classList.remove('animate-jump');
                    legLeft.classList.remove('animate-leg-jump');
                    legRight.classList.remove('animate-leg-jump');
                    leftArm.classList.remove('animate-jump-arms');
                    rightArm.classList.remove('animate-jump-arms');
                }, 900);

                setTimeout(() => {
                    tildaContainer.classList.remove('animate-tilda-jump');
                    mouthPath.setAttribute('d', MOUTH_NEUTRAL);
                    pupils.forEach(p => {
                        p.classList.remove('animate-look-jump');
                        p.style.animation = 'lookAround 8s infinite ease-in-out';
                    });
                    isAnimating = false;
                }, 1800); 
            });

            // Инициализация первого таймера
            resetIdleTimer();
        };
    </script>
</body>
</html>
